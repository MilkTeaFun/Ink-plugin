name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install lint dependencies
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Run plugin lint
        run: npm run lint
